name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'RECOVERY URL'
        required: true
        default: 'https://files.catbox.moe'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt install git wget lz4 tar openssl python3 -y

    - name: Fetch image from URL
      run: |
        URL="${{ github.event.inputs.RECOVERY_URL }}"
        if [[ "$URL" == *"drive.google.com"* ]]; then
          FILE_ID=$(echo "$URL" | grep -oP '(?<=d/)[^/]+|(?<=id=)[^&]+' | head -n 1)
          CONFIRM=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com" -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')
          wget --load-cookies /tmp/cookies.txt "https://docs.google.com" -O recovery.img
          rm -rf /tmp/cookies.txt
        else
          wget -L "$URL" -O recovery.img
        fi
        # Create a copy named r.img because your script2.sh expects ../r.img
        cp recovery.img r.img

    - name: Patch Process-1
      run: |
        chmod a+x script1.sh magiskboot
        ./script1.sh recovery.img || true

    - name: Patch Process-2
      run: |
        chmod a+x script2.sh
        ./script2.sh || true
        
        # Standardize the PEM key format to fix the ASN.1 error
        openssl rsa -in phh.pem -out phh_fixed.pem || cp phh.pem phh_fixed.pem
        
        # Extract public key
        python3 avbtool extract_public_key --key phh_fixed.pem --output phh.pub.bin
        
        # Sign r-patched.img (this is what your script2.sh creates)
        python3 avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size $(wc -c < recovery.img) \
          --image r-patched.img \
          --key phh_fixed.pem \
          --algorithm SHA256_RSA4096
        
        mkdir -p output
        mv r-patched.img output/recovery.img
        cd output
        tar cvf fastbootd-recovery.tar recovery.img
        md5sum -t fastbootd-recovery.tar >> fastbootd-recovery.tar
        mv fastbootd-recovery.tar fastbootd-recovery.tar.md5

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/fastbootd-recovery.tar.md5
        name: Patched-Recovery
        tag_name: ${{ github.run_id }}
